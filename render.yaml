services:
  # CMS Backend API
  - type: web
    name: eduai-cms-api
    runtime: node
    buildCommand: npm install
    startCommand: node cms-server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CMS_PORT
        value: 10000
      - key: CMS_ADMIN_TOKEN
        generateValue: true
    healthCheckPath: /api/health
    autoDeploy: true

  # Static Web App (Expo Web Export)
  - type: web
    name: eduai-mobile-web
    runtime: static
    buildCommand: npm install && npx expo export --platform web
    staticPublishPath: dist
    envVars:
      - key: NODE_ENV
        value: production
      - key: EXPO_PUBLIC_CMS_BASE_URL
        fromService:
          name: eduai-cms-api
          type: web
          property: url
