services:
  # CMS Backend API — rootDir isolates it from the Expo app entry files
  - type: web
    name: eduai-cms-api
    runtime: node
    rootDir: cms-server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CMS_ADMIN_TOKEN
        generateValue: true
    healthCheckPath: /api/health
    autoDeploy: true

  # Static Web App — Expo web export, served as static files (no Node runtime)
  - type: web
    name: eduai-mobile-web
    runtime: static
    buildCommand: npm install && npx expo export --platform web
    staticPublishPath: dist
    envVars:
      - key: NODE_ENV
        value: production
      - key: EXPO_PUBLIC_CMS_BASE_URL
        fromService:
          name: eduai-cms-api
          type: web
          property: url
