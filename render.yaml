services:
  # ── CMS Backend API (Node + Supabase) ──────────────────────────────────────
  - type: web
    name: eduai-cms-api
    runtime: node
    rootDir: cms-server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CMS_ADMIN_TOKEN
        generateValue: true        # Render generates a random token; copy it from the dashboard
      - key: SUPABASE_URL
        sync: false                # Fill in Render dashboard: your Supabase project URL
      - key: SUPABASE_SERVICE_KEY
        sync: false                # Fill in Render dashboard: Supabase service_role key (Settings → API)
    healthCheckPath: /api/health
    autoDeploy: true
